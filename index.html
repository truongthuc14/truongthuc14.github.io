<!DOCTYPE html>
<html lang="vi" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio</title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- CSS -->
  <link rel="stylesheet" href="style.css">

  <!-- GSAP -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
</head>

<body class="text-white">

<!-- Cursor -->
<div class="cursor" id="cursor"></div>

<!-- NAV -->
<nav class="flex justify-between p-6 max-w-6xl mx-auto">
  <h1 class="font-bold text-xl">Leinad.</h1>
  <button onclick="toggleDark()" class="bg-green-400 text-black px-4 py-2 rounded">
    Toggle
  </button>
</nav>

<!-- HERO -->
<section class="text-center py-24">
  <h1 class="text-4xl font-bold">
    Hi, I am <span class="text-green-400">Daniel</span>
  </h1>
  <p class="opacity-70 mt-4">Frontend Developer với UI hiện đại</p>
</section>

<!-- SERVICES -->
<section class="max-w-6xl mx-auto px-6 reveal">
  <h2 class="text-2xl mb-6">Services</h2>
  <div class="grid md:grid-cols-3 gap-6">
    <div class="card p-6 border rounded-xl">Web Dev</div>
    <div class="card p-6 border rounded-xl">UI Design</div>
    <div class="card p-6 border rounded-xl">Content</div>
  </div>
</section>

<!-- ABOUT -->
<section class="flex flex-col items-center py-20 reveal">
  <img src="https://i.pravatar.cc/200" class="rounded-full border-4 border-green-400 mb-6">
  <p class="max-w-md text-center opacity-70">
    Tôi làm UI đẹp và mượt
  </p>
</section>

<!-- CONTACT -->
<section class="max-w-4xl mx-auto px-6 py-20 grid md:grid-cols-2 gap-6 reveal">
  <div>
    <h2 class="text-xl">Contact</h2>
    <p>Email: test@gmail.com</p>
  </div>
  <div>
    <input class="w-full p-2 mb-3 bg-transparent border" placeholder="Name">
    <input class="w-full p-2 mb-3 bg-transparent border" placeholder="Email">
    <textarea class="w-full p-2 mb-3 bg-transparent border" placeholder="Message"></textarea>
    <button class="bg-green-400 text-black px-4 py-2 rounded">Send</button>
  </div>
</section>

<script src="app.js"></script>
</body>
</html>
